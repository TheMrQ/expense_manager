<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="form-container">
        <div class="logo-container">
            <img src="img/rotate.png" alt="Logo" class="logo">
        </div>

        <h2>Change your password</h2>

        <form action="../api/user/reset_password.php" method="post">
            <!-- MODIFIED: Hidden input now has an ID for JavaScript to target -->
            <input type="hidden" name="token" id="resetToken">

            <div class="form-group">
                <input type="password" name="new_password" placeholder="New Password" required
                    autocomplete="new-password">
            </div>

            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required
                    autocomplete="new-password" style="margin-bottom: 20px;">
            </div>

            <button type="submit" class="btn">Reset Password</button>
        </form>

        <p class="create-account">
            <a href="login.html" class="green-link">Back to Login</a>
        </p>
    </div>

    <!-- NEW: JavaScript to grab token from URL and put it in the form -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Create a URLSearchParams object from the current URL's query string
            const urlParams = new URLSearchParams(window.location.search);

            // 2. Get the value of the 'token' parameter
            const token = urlParams.get('token');

            // 3. Find the hidden input field by its ID and set its value
            const tokenInput = document.getElementById('resetToken');
            if (tokenInput) {
                tokenInput.value = token;
            }
        });
    </script>
</body>

</html>
