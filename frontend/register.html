<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="form-container">
        <h2 style="color: #03ca93;">Create Account</h2>
        <p class="subtitle">Get started by creating your account</p>        
        <form action="../backend/user/register.php" method="POST">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required />
            </div>
            <div class="form-group">
                <input type="email" id="email" name="email" class="input" placeholder="Email" required />
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required />
            </div>
            <div class="form-group">
                <input type="password" id="confirm_password" name="confirm_password" style="margin-bottom: 20px;" placeholder="Confirm Password" required />
            </div>
            <button type="submit" class="btn" id="regbtn">Register</button>
        </form>
        <p class="create-account">
            <a href="login.html" class="green-link">Back to Login</a>
        </p>
    </div>
</body>
</html>
