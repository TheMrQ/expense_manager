<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="form-container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="img/wallet-passes-app.png" alt="Logo" class="logo" />
        </div>

        <h2>Login</h2>

        <form action="../backend/user/login.php" method="POST">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required />
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required />
            </div>
        
            <p class="forgot-password">
                <a href="forgot_password.html" class="green-link">Forgot Password?</a>
            </p>
        
            <button type="submit" class="btn">Login</button>
        </form>
        

        <p class="create-account">
            <a href="register.html" class="green-link">Create Account</a>
        </p>
    </div>
</body>
</html>
